name: Publish Python 🐍 distribution 📦 to PyPI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'src/**'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  tag:
    name: Tag the new version 🏷️
    runs-on: ubuntu-latest
    permissions:
        contents: write  # Allow the CI's token to create the ref (tag)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: ⏬ Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: 🧮 Get the next version
        id: next-version
        run: echo "version=$(uvx setuptools-scm --strip-dev --format plain)" >> $GITHUB_OUTPUT
      - name: 🏷️ Create the Git tag
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          tag_name: ${{ steps.next-version.outputs.version }}
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/' + process.env.tag_name.trim(),
                sha: context.sha
              })

  build:
    name: Build distribution 📦
    needs:
      - tag
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
      - name: ⏬ Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: 🛠️ Build a binary wheel and a source tarball
        run: uv build
      - name: 📤 Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: itoutils-distributions
          path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/itoutils
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: itoutils-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          attestations: true
          print-hash: true
